<!DOCTYPE html>
<html>
<head>
    <title>Lab Task 6</title>
    <link rel="stylesheet" href="style2.css">
<body>

<div class="container">

    <h2>1. Block Display Example</h2>
    <input type="text" placeholder="Name" class="block-input">
    <input type="email" placeholder="Email" class="block-input">


    <h2>2. Inline-Block Example</h2>
    <div class="inline-section">
        <p>Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
        <button>Yes</button>
        <button>No</button>
    </div>


    <h2>3. Google Search Form</h2>
    <div class="google">
        <img src="google.png">
        <br>
        <input type="text" placeholder="Search Google or type a URL">
    </div>


    <h2>4. Sign Up Form</h2>
    <div class="signup">
        <input type="text" placeholder="First name" class="name">
        <input type="text" placeholder="Last name" class="name">
        <input type="email" placeholder="Email" class="email">
        <button>Sign Up</button>
    </div>


    <h2>5. Uber Request Form</h2>
    <div class="uber">
        <h3>Request a ride now</h3>
        <input type="text" placeholder="Enter pickup location">
        <input type="text" placeholder="Enter destination">
        <button class="request">Request now</button>
        <button class="schedule">Schedule for later</button>
    </div>

</div>

</body>
</html>
